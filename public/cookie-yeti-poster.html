<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Cookie Yeti Poster — Review before posting to TikTok</title>
<style>
 :root{--bg:#0B1322;--card:#13203A;--line:#2A3B5E;--fg:#EAF1FF;--mut:#8FA6C8;--accent:#34DADA}
 *{box-sizing:border-box}
 body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif}
 .wrap{max-width:880px;margin:0 auto;padding:28px}
 .top{display:flex;align-items:center;gap:12px;margin-bottom:18px}
 .top img{width:44px;height:44px;border-radius:10px}
 h1{font-size:20px;margin:0}.sub{color:var(--mut);font-size:13px}
 .grid{display:grid;grid-template-columns:300px 1fr;gap:24px}
 @media(max-width:680px){.grid{grid-template-columns:1fr}}
 video{width:300px;max-width:100%;border-radius:16px;background:#000}
 label{display:block;font-weight:600;margin:14px 0 6px}
 textarea{width:100%;min-height:120px;background:var(--card);color:var(--fg);border:1px solid var(--line);border-radius:10px;padding:10px;font:14px/1.5 inherit}
 select{width:100%;background:var(--card);color:var(--fg);border:1px solid var(--line);border-radius:10px;padding:10px}
 .disc{display:flex;gap:8px;align-items:flex-start;margin:14px 0;color:#B9C8E4;font-size:13px}
 .acct{color:var(--accent);font-weight:600}
 button{background:var(--accent);color:#03212B;border:0;border-radius:12px;padding:13px 22px;font-weight:700;font-size:15px;cursor:pointer;margin-top:8px}
 button:disabled{opacity:.5;cursor:default}
 #status{margin-top:14px;white-space:pre-wrap;font:13px/1.5 ui-monospace,Menlo,monospace;color:#9FE6C4}
 .cap{color:var(--mut);font-size:12px;margin-top:4px}
</style></head><body><div class="wrap">
 <div class="top"><img src="/cookie-yeti-poster-icon.png" alt=""><div>
   <h1>Review before posting to TikTok</h1>
   <div class="sub">Posting to <span class="acct">@cookie_yeti_privacy</span> &middot; Cookie Yeti Poster</div></div></div>
 <div class="grid">
  <div><video id="preview" controls playsinline></video><div class="cap">Today's reel preview</div></div>
  <div>
   <label>Caption</label>
   <textarea id="caption">every website begging you to accept cookies? this free app just says no for you 🧊 Cookie Yeti auto-clears the pop-ups in Safari so you never tap them again — install once, then just browse. #cookies #iphone #privacy #safari #techtok</textarea>
   <label>Who can view this post</label>
   <select id="privacy"><option value="">Loading options from TikTok…</option></select>
   <div class="disc"><input type="checkbox" id="ok"><label for="ok" style="margin:0;font-weight:400">I confirm this video and caption will be posted to TikTok as @cookie_yeti_privacy.</label></div>
   <button id="post" disabled>Post to TikTok</button>
   <div id="status"></div>
  </div>
 </div>
<script>
 // CONFIG — set before deploy:
 const FN_BASE = "https://rcqfqhguwpmaarseifqg.supabase.co/functions/v1/tiktok-poster";
 const REEL_URL = "https://www.bestly.tech/cookie-yeti-today-reel.mp4";
 const ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjcWZxaGd1d3BtYWFyc2VpZnFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTc1OTUsImV4cCI6MjA5MDkzMzU5NX0.MHwsTd3CmaTViv3HoFRbeF1t6hmlf5W-p_4eHFBQP9k";
 const LV={PUBLIC_TO_EVERYONE:"Everyone (public)",MUTUAL_FOLLOW_FRIENDS:"Friends",SELF_ONLY:"Only me (private)"};
 const hdr={"Content-Type":"application/json","Authorization":"Bearer "+ANON,"apikey":ANON};
 document.getElementById('preview').src=REEL_URL;
 fetch(FN_BASE+"?action=creator-info",{headers:hdr}).then(r=>r.json()).then(d=>{
   const sel=document.getElementById('privacy');sel.innerHTML='';
   const opts=((d.data||{}).privacy_level_options)||['PUBLIC_TO_EVERYONE','MUTUAL_FOLLOW_FRIENDS','SELF_ONLY'];
   opts.forEach(o=>{const e=document.createElement('option');e.value=o;e.textContent=LV[o]||o;sel.appendChild(e);});
 }).catch(_=>{document.getElementById('privacy').innerHTML='<option value="SELF_ONLY">Only me (private)</option>';});
 const ok=document.getElementById('ok'),btn=document.getElementById('post');
 ok.onchange=()=>btn.disabled=!ok.checked;
 btn.onclick=async()=>{btn.disabled=true;document.getElementById('status').textContent='Posting…';
   const r=await fetch(FN_BASE,{method:'POST',headers:hdr,body:JSON.stringify({action:'post',videoUrl:REEL_URL,
     caption:document.getElementById('caption').value,privacy:document.getElementById('privacy').value})});
   document.getElementById('status').textContent=await r.text();btn.disabled=false;};
</script></div></body></html>
