<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex">
<title>Bestly Publisher — review before posting to TikTok</title>
<style>
 :root{--bg:#0B1322;--card:#13203A;--line:#2A3B5E;--fg:#EAF1FF;--mut:#8FA6C8;--accent:#34DADA}
 *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif}
 .wrap{max-width:900px;margin:0 auto;padding:28px}
 .top{display:flex;align-items:center;gap:12px;margin-bottom:18px}
 .top img{width:44px;height:44px;border-radius:10px}
 h1{font-size:20px;margin:0}.sub{color:var(--mut);font-size:13px}
 .grid{display:grid;grid-template-columns:300px 1fr;gap:24px}
 @media(max-width:700px){.grid{grid-template-columns:1fr}}
 video{width:300px;max-width:100%;border-radius:16px;background:#000}
 label{display:block;font-weight:600;margin:14px 0 6px}
 textarea{width:100%;min-height:120px;background:var(--card);color:var(--fg);border:1px solid var(--line);border-radius:10px;padding:10px;font:14px/1.5 inherit}
 select{width:100%;background:var(--card);color:var(--fg);border:1px solid var(--line);border-radius:10px;padding:10px}
 .disc{display:flex;gap:8px;align-items:flex-start;margin:14px 0;color:#B9C8E4;font-size:13px}
 .acct{color:var(--accent);font-weight:600}
 button{background:var(--accent);color:#03212B;border:0;border-radius:12px;padding:13px 22px;font-weight:700;font-size:15px;cursor:pointer;margin-top:8px}
 button:disabled{opacity:.5;cursor:default}
 #status{margin-top:14px;white-space:pre-wrap;font:13px/1.5 ui-monospace,Menlo,monospace;color:#9FE6C4}
 .cap{color:var(--mut);font-size:12px;margin-top:4px}
</style></head><body><div class="wrap">
 <div class="top"><img src="/bestly-poster-icon.png" alt=""><div>
   <h1>Bestly Publisher — review before posting to TikTok</h1>
   <div class="sub">Bestly LLC publishes our own brands' promo videos to our own TikTok accounts.</div></div></div>
 <label>Account (brand)</label>
 <select id="brand"><option value="">Loading brands…</option></select>
 <div class="grid" style="margin-top:16px">
  <div><video id="preview" controls playsinline></video><div class="cap">Reel preview</div></div>
  <div>
   <label>Caption</label>
   <textarea id="caption">every website begging you to accept cookies? this free app just says no for you 🧊 Cookie Yeti auto-clears the pop-ups in Safari so you never tap them again. #cookies #iphone #privacy #safari #techtok</textarea>
   <label>Who can view this post</label>
   <select id="privacy"><option value="">Select a brand first…</option></select>
   <div class="disc"><input type="checkbox" id="ok"><label for="ok" style="margin:0;font-weight:400">I confirm this video and caption will be posted to TikTok as <span id="acctname" class="acct">the selected account</span>.</label></div>
   <button id="post" disabled>Post to TikTok</button>
   <div id="status"></div>
  </div>
 </div>
<script>
 const FN_BASE="https://rcqfqhguwpmaarseifqg.supabase.co/functions/v1/bestly-poster";
 const ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjcWZxaGd1d3BtYWFyc2VpZnFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTc1OTUsImV4cCI6MjA5MDkzMzU5NX0.MHwsTd3CmaTViv3HoFRbeF1t6hmlf5W-p_4eHFBQP9k";
 const REELS={cookieyeti:"https://www.bestly.tech/cookie-yeti-today-reel.mp4"};
 const LV={PUBLIC_TO_EVERYONE:"Everyone (public)",MUTUAL_FOLLOW_FRIENDS:"Friends",SELF_ONLY:"Only me (private)"};
 const hdr={"Content-Type":"application/json","Authorization":"Bearer "+ANON,"apikey":ANON};
 const $=id=>document.getElementById(id);
 let brand="";
 fetch(FN_BASE+"?action=brands",{headers:hdr}).then(r=>r.json()).then(d=>{
   const sel=$("brand");sel.innerHTML="";
   (d.brands||[]).forEach(b=>{const o=document.createElement("option");o.value=b.slug;o.textContent=b.label+(b.connected?"":" — connect pending");o.disabled=!b.connected;sel.appendChild(o);});
   const first=(d.brands||[]).find(b=>b.connected); if(first){sel.value=first.slug; loadBrand(first.slug);}
 });
 $("brand").onchange=e=>loadBrand(e.target.value);
 function loadBrand(b){
   brand=b; $("preview").src=REELS[b]||""; $("status").textContent="";
   $("post").disabled=true; $("ok").checked=false;
   fetch(FN_BASE+"?action=creator-info&brand="+b,{headers:hdr}).then(r=>r.json()).then(d=>{
     const c=d.data||{}; $("acctname").textContent=(c.creator_username?"@"+c.creator_username:b);
     const sel=$("privacy");sel.innerHTML="";
     (c.privacy_level_options||["PUBLIC_TO_EVERYONE","MUTUAL_FOLLOW_FRIENDS","SELF_ONLY"]).forEach(o=>{const e=document.createElement("option");e.value=o;e.textContent=LV[o]||o;sel.appendChild(e);});
   }).catch(_=>{});
 }
 $("ok").onchange=()=>$("post").disabled=!$("ok").checked;
 $("post").onclick=async()=>{$("post").disabled=true;$("status").textContent="Posting…";
   const r=await fetch(FN_BASE,{method:"POST",headers:hdr,body:JSON.stringify({action:"post",brand,videoUrl:REELS[brand],caption:$("caption").value,privacy:$("privacy").value})});
   $("status").textContent=await r.text();$("post").disabled=false;};
</script></div></body></html>
